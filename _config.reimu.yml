# Reimu主题核心配置（v1.12.0兼容版）
# 基础信息
avatar: "avatar.jpg"
author: 小韩

# 本地搜索功能
generator_search:
  enable: true
  per_page: 10
  content: true

# 评论系统全局配置（必须和giscus同级，缩进0）
comment:
  enable: true
  title:
    zh-CN: 说些什么吧！
  default: giscus  # 强制指定默认评论系统为giscus

# Giscus评论配置（和comment同级，缩进0，所有子项缩进2）
giscus:
  enable: true
  repo: "XiaoHanzuishuai/hexo"
  repoId: "R_kgDORU0QPA"
  category: "Announcements"
  categoryId: "DIC_kwDORU0QPM4C25Wf"
  mapping: "pathname"
  strict: 0
  reactionsEnabled: 1
  emitMetadata: 0
  inputPosition: "bottom"
  theme: "light"
  lang: "zh-CN"
